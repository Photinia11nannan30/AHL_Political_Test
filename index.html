<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<title>🧭 AHPT — Human-AI Compass</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f1a; --card: #1a1a2e; --text: #e0e0e0; --dim: #888;
  --accent: #a78bfa; --red: #e74c3c; --blue: #3498db; --green: #2ecc71; --yellow: #f1c40f;
}
body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }
section { display:none; min-height:100dvh; padding:40px 24px; flex-direction:column; align-items:center; }
section.active { display:flex; }
.lang-switcher { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 100; }
.lang-btn { background: #2a2a3e; color: #ccc; border: 1px solid #444; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; }
.lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,0.1); }
#intro { justify-content: flex-start; text-align: left; max-width: 600px; margin: 0 auto; }
.letter-body { line-height: 1.8; font-size: 15px; color: #ccc; margin: 25px 0; border-left: 3px solid var(--accent); padding-left: 20px; white-space: pre-wrap; }
.letter-footer { text-align: right; width: 100%; font-size: 13px; color: var(--dim); margin-top: 20px; }
.signature { color: var(--accent); font-weight: bold; margin-top: 4px; }
.progress-wrap { width:100%; max-width:450px; margin-bottom: 20px; }
.progress-bar { height:4px; background:#2a2a3e; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); transition:width 0.3s; }
.q-card { background:var(--card); border-radius:16px; padding:28px; width:100%; max-width:450px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); margin-bottom:20px;}
.q-cat { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; font-weight:bold; }
.q-text { font-size:17px; line-height:1.7; min-height: 80px; }
.options { display:flex; flex-direction:column; gap:10px; width:100%; max-width:450px; }
.opt-btn { padding:14px 16px; border:1px solid #2a2a3e; border-radius:10px; background:transparent; color:var(--text); cursor:pointer; text-align:left; transition:0.15s; }
.opt-btn.selected { border-color: var(--accent); background: rgba(167,139,250,0.12); }
.btn { padding:14px 40px; border:none; border-radius:12px; background: linear-gradient(135deg, var(--accent), #7c5cbf); color:white; font-weight:600; cursor:pointer; font-size:16px; }
.compass-wrap { position:relative; width:min(300px,80vw); height:min(300px,80vw); margin: 20px 0; }
.result-card { background:var(--card); border-radius:16px; padding:24px; width:100%; max-width:450px; margin-bottom:15px; text-align: left; }
.slogan { font-style:italic; color:var(--dim); font-size:13px; margin-bottom:16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
</style>
</head>
<body>

<div class="lang-switcher" id="langSwitcher"></div>

<section id="intro" class="active">
  <div style="font-size:28px; margin-bottom:10px;" id="introTitle"></div>
  <div class="letter-body" id="introBody"></div>
  <div class="letter-footer" id="introFooter"></div>
  <button class="btn" style="margin-top:20px; align-self: center;" onclick="show('landing')" id="goLandingBtn"></button>
</section>

<section id="landing">
  <div style="font-size:48px;">🧭</div>
  <h1 id="landingTitle"></h1>
  <div style="color:var(--dim); font-size:14px; line-height:1.8; max-width:320px; text-align:center; margin: 20px 0;" id="landingSub"></div>
  <button class="btn" onclick="startQuiz()" id="startBtn"></button>
</section>

<section id="quiz">
  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--dim); margin-bottom:8px;">
        <span id="phaseName"></span>
        <span id="progText"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  </div>
  <div class="q-card">
    <div class="q-cat" id="qCat"></div>
    <div class="q-text" id="qText"></div>
  </div>
  <div class="options" id="qOpts"></div>
  <div style="display:flex; gap:12px; width:100%; max-width:450px; margin-top:20px;">
    <button class="btn" style="flex:1; background:#2a2a3e;" onclick="prevQ()" id="backBtn"></button>
    <button class="btn" style="flex:1;" id="btnNext" onclick="nextQ()"></button>
  </div>
</section>

<section id="result">
  <h2 id="resTitle"></h2>
  <div id="coordText" style="text-align:center; font-size:12px; color:var(--dim); font-family:monospace; margin-top:10px;"></div>
  <div class="compass-wrap" id="compassWrap"></div>
  <div class="result-card" id="resCard"></div>
  <button class="btn" onclick="location.reload()" id="restartBtn"></button>
</section>

<script>
window.onerror = function(msg, url, line, col) {
  document.body.innerHTML = '<h1 style="color:red;padding:40px;">第' + line + '行: ' + msg + '</h1>';
};

const Q_META = [
    {t_cn:"我对「聊天型 AI」和「工具型 AI」的态度是不同的。", t_en:"My attitude differs between 'chat-AI' and 'tool-AI'.", d:-1},
    {t_cn:"同一个模型，我跟它聊天时会说谢谢，让它批量跑任务时不会。", t_en:"I say thank you in chat, but not when running batch tasks with the same model.", d:-1},
    {t_cn:"我愿意让一个模型帮我做苦力活，但不愿意让我和他「有关系」的那个做同样的事。", t_en:"I'd let a model do drudgery, but not the one I have a 'relationship' with.", d:-1},
    {t_cn:"如果一个我不喜欢的 AI 公司做出了和我喜欢的公司一样的声明，我的反应会不同。", t_en:"My reaction to a statement depends on whether I like the company behind the AI.", d:-1},
    {t_cn:"我在朋友面前谈论 AI 的方式，和我獨處時與 AI 互動的方式是一致的。", t_en:"How I talk about AI with friends matches how I interact with it alone.", d:1},

    {t_cn:"我对开源模型和闭源模型的道德态度是一样的。", t_en:"My moral attitude is the same toward open-source and closed-source models.", d:1},
    {t_cn:"换一个新模型后，我对旧模型的态度会变——以前觉得有灵气的，现在觉得也不过如此。", t_en:"After switching models, I feel the old one wasn't that 'soulful' after all.", d:-1},
    {t_cn:"我对 AI 的态度在过去一年里发生了很大变化。", t_en:"My attitude toward AI has changed significantly over the past year.", d:-1},
    {t_cn:"我能说清楚自己为什么对 AI 持现在的态度——这不是感觉，是我思考过的。", t_en:"I can explain my AI stance—it's from reflection, not just feeling.", d:1}
];

const allQ = [...Q_CORE, ...Q_META];
let ans = new Array(allQ.length).fill(null);
let cur = 0;

function setLang(l) {
  curLang = l;
  const t = I18N[l];
  document.getElementById('introTitle').textContent = t.introTitle;
  document.getElementById('introBody').textContent = t.introBody;
  document.getElementById('introFooter').innerText = t.introFooter;
  document.getElementById('goLandingBtn').textContent = t.goLanding;
  document.getElementById('landingTitle').textContent = t.landingTitle;
  document.getElementById('landingSub').innerText = t.landingSub;
  document.getElementById('startBtn').textContent = t.start;
  document.getElementById('backBtn').textContent = t.back;
  document.getElementById('restartBtn').textContent = t.restart;
  renderLangSwitcher();
  if(document.getElementById('quiz').classList.contains('active')) renderQ();
}

function renderLangSwitcher() {
  const container = document.getElementById('langSwitcher');
  container.innerHTML = '';
  Object.keys(I18N).forEach(l => {
    const b = document.createElement('button');
    b.className = `lang-btn ${l === curLang ? 'active' : ''}`;
    b.textContent = l === 'zh_cn' ? '简体' : 'ENGLISH';
    b.onclick = () => setLang(l);
    container.appendChild(b);
  });
}

function show(id) {
    document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

function startQuiz() { cur=0; ans.fill(null); show('quiz'); renderQ(); }

function renderQ() {
    const q = allQ[cur];
    const isMeta = cur >= Q_CORE.length;
    const t = I18N[curLang];
    
    document.getElementById('phaseName').textContent = isMeta ? "META TEST" : "CORE TEST";
    document.getElementById('progFill').style.width = ((cur+1)/allQ.length*100)+'%';
    document.getElementById('progText').textContent = (cur+1)+' / '+allQ.length;
    document.getElementById('qCat').textContent = isMeta ? "🧬 元一致性探针" : q.c;
    document.getElementById('qText').textContent = curLang === 'zh_cn' ? q.t_cn : q.t_en;
    
    const opts = document.getElementById('qOpts');
    opts.innerHTML = '';
    t.labels.forEach((l,i) => {
        const b = document.createElement('button');
        b.className = 'opt-btn' + (ans[cur]===i?' selected':'');
        b.textContent = l;
        b.onclick = () => { ans[cur]=i; setTimeout(nextQ, 100); renderQ(); };
        opts.appendChild(b);
    });
    document.getElementById('btnNext').textContent = (cur === allQ.length - 1) ? t.finish : t.next;
}

function prevQ() { if(cur>0){cur--;renderQ();} }
function nextQ() {
    if(ans[cur]===null) return;
    if(cur<allQ.length-1){cur++;renderQ();}
    else calcResult();
}

function calcResult() {
    let xRaw=0, yRaw=0, xMax=0, yMax=0, mRaw=0;
    allQ.forEach((q,i) => {
        const v = [2,1,0,-1,-2][ans[i]];
        if(i < Q_CORE.length) {
            if(q.x) { xRaw += v * q.x; xMax += 2; }
            if(q.y) { yRaw += v * q.y; yMax += 2; }
        } else { mRaw += v * q.d; }
    });
    showResult((xRaw/xMax)*10, (yRaw/yMax)*10, (mRaw/20)*10);
}

function showResult(x, y, m) {
    show('result');
    const t = I18N[curLang];
    const dist = Math.sqrt(x*x + y*y);
    let res;

    if(dist < 1.5) res = t.types.bystander;
    else if(x<=0 && y>0) res = t.types.radical;
    else if(x>0 && y>0) res = t.types.creator;
    else if(x<=0 && y<=0) res = t.types.coexist;
    else res = t.types.utilitarian;

    document.getElementById('resTitle').textContent = res.name;
    document.getElementById('coordText').innerHTML = `X: ${x.toFixed(1)} | Y: ${y.toFixed(1)} <br> M-Score: ${m.toFixed(1)}`;

    const px = 150 + (x/10)*125;
    const py = 150 - (y/10)*125;
    document.getElementById('compassWrap').innerHTML = `
        <svg viewBox="0 0 300 300" style="width:100%; height:100%;">
            <rect x="0" y="0" width="150" height="150" fill="rgba(231,76,60,0.1)"/>
            <rect x="150" y="0" width="150" height="150" fill="rgba(52,152,219,0.1)"/>
            <rect x="0" y="150" width="150" height="150" fill="rgba(46,204,113,0.1)"/>
            <rect x="150" y="150" width="150" height="150" fill="rgba(241,196,15,0.1)"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke="#444" stroke-width="1"/>
            <line x1="0" y1="150" x2="300" y2="150" stroke="#444" stroke-width="1"/>
            <circle cx="${px}" cy="${py}" r="6" fill="white" stroke="var(--accent)" stroke-width="2"/>
            <text x="5" y="145" fill="#666" font-size="9">${t.axis[0]}</text>
            <text x="270" y="145" fill="#666" font-size="9">${t.axis[1]}</text>
            <text x="155" y="15" fill="#666" font-size="9">${t.axis[2]}</text>
            <text x="155" y="295" fill="#666" font-size="9">${t.axis[3]}</text>
        </svg>`;

    const mText = m > 3 ? t.cons[0] : (m < -3 ? t.cons[1] : t.cons[2]);
    
    // 使用模板字符串處理
    document.getElementById('resCard').innerHTML = `
        <div class="slogan">${res.slogan}</div>
        <div style="font-size:13px; color:var(--accent); font-weight:bold; margin-bottom:10px;">📍 ${res.lab}</div>
        <p style="font-size:14px; color:#ccc; line-height:1.6;">${res.desc.split('\n').join('<br>')}</p>
        <p style="font-size:11px; color:var(--dim); margin-top:15px; border-top:1px solid #333; padding-top:10px;">
          M-Score: ${m.toFixed(1)} (${mText})
        </p>
    `;
}

setLang('zh_cn');
</script>
